global
  maxconn 4096
  log stdout format raw local0

defaults
  mode tcp
  log global
  option tcplog
  timeout connect 5s
  timeout client 10m
  timeout server 10m

frontend tidb_frontend
  bind 127.0.0.1:34008
  default_backend tidb_backends

backend tidb_backends
  balance roundrobin
  option tcp-check
  default-server inter 2s rise 2 fall 2
  server tidb0 192.168.27.181:4000 check
  server tidb1 192.168.23.56:4000 check
  server tidb2 192.168.7.250:4000 check

listen stats
  bind 127.0.0.1:18080
  mode http
  stats enable
  stats uri /stats
  stats refresh 5s
